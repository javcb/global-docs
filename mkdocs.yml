site_name: global-docs
site_description: Personal documentation hub for GitHub orgs, AI rules, architecture, and processes
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - docs/assets/extra.css

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Quick reference:
    - FAQ: FAQ.md
    - How to update: UPDATING.md
    - Open items: OPEN-ITEMS.md
  - Orgs:
    - Overview: orgs/overview.md
    - Main account: orgs/javcb.md
    - javcb-prod: orgs/javcb-prod.md
    - javcb-staging: orgs/javcb-staging.md
    - javcb-templates: orgs/javcb-templates.md
    - javcb-archive: orgs/javcb-archive.md
    - javcb-ai: orgs/javcb-ai.md
  - AI rules:
